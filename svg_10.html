<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>svg practice</title>
</head>
<body>

  <svg viewbox="0 0 100 100">
    <rect ></rect>

  <circle cx="50" cy="50" r="40" fill="red"/>

  <rect x="10" y="10" width="80" height="50" fill="blue"/>

  <line x1="0" y1="0" x2="100" y2="100" stroke="black"/>

  <polygon points="50,15 90,85 10,85" fill="green"/>

  <path d="M10 80 C 40 10, 65 10, 95 80" stroke="purple" fill="transparent"/>

  </svg>


</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple SVG Demo</title>
</head>
<body>
  <!-- A basic SVG canvas -->
  <svg width="200" height="200" style="border:1px solid #ccc">
    <!-- A circle -->
    <circle cx="100" cy="100" r="50" fill="skyblue" stroke="navy" stroke-width="2"/>
    
    <!-- A rectangle -->
    <rect x="20" y="20" width="50" height="50" fill="lightgreen" stroke="darkgreen"/>
    
    <!-- A line -->
    <line x1="0" y1="200" x2="200" y2="0" stroke="red" stroke-width="2"/>
    
    <!-- Text -->
    <text x="50" y="180" font-size="16" fill="black">Hello SVG</text>
  </svg>
</body>
</html>



<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SVG Bot</title>
</head>
<body>
  <svg width="200" height="250" style="border:1px solid #ccc">
    <!-- Head -->
    <rect x="60" y="20" width="80" height="60" rx="10" ry="10" fill="lightgray" stroke="black"/>
    
    <!-- Eyes -->
    <circle cx="80" cy="50" r="8" fill="white" stroke="black"/>
    <circle cx="120" cy="50" r="8" fill="white" stroke="black"/>
    <circle cx="80" cy="50" r="4" fill="black"/>
    <circle cx="120" cy="50" r="4" fill="black"/>
    
    <!-- Antenna -->
    <line x1="100" y1="20" x2="100" y2="5" stroke="black" stroke-width="2"/>
    <circle cx="100" cy="5" r="5" fill="red"/>
    
    <!-- Body -->
    <rect x="50" y="90" width="100" height="100" rx="10" ry="10" fill="lightblue" stroke="black"/>
    
    <!-- Arms -->
    <rect x="30" y="100" width="20" height="80" fill="gray" stroke="black"/>
    <rect x="150" y="100" width="20" height="80" fill="gray" stroke="black"/>
    
    <!-- Legs -->
    <rect x="70" y="190" width="20" height="40" fill="gray" stroke="black"/>
    <rect x="110" y="190" width="20" height="40" fill="gray" stroke="black"/>
  </svg>
</body>
</html>
